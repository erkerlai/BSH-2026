<style>
  :root{

    --ok:#3b6d11; --ok-line:#97c459;
  }

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    font-size:16px;line-height:1.5;padding:0 0 40px;}
  .wrap{max-width:760px;margin:0 auto;padding:12px;}
  header{position:sticky;top:0;z-index:20;background:var(--bg);
    padding:10px 12px 8px;border-bottom:0.5px solid var(--line);}
  .titlebar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .titlebar h1{font-size:17px;font-weight:600;margin:0;}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--hint);}
  .tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .tabs button{flex:0 0 auto;font-size:13px;padding:8px 12px;border-radius:10px;
    border:0.5px solid var(--line2);background:var(--card);color:var(--text);
    white-space:nowrap;cursor:pointer;}
  .tabs button.active{background:var(--info-bg);color:var(--info);border-color:var(--info-line);font-weight:600;}
  details{margin:12px 0;border:0.5px solid var(--line);border-radius:12px;
    background:var(--card);padding:10px 14px;}
  summary{cursor:pointer;font-size:15px;font-weight:600;list-style:none;}
  summary::-webkit-details-marker{display:none;}
  summary .c{color:var(--muted);font-weight:400;font-size:13px;}
  .grp-title{font-size:13px;font-weight:600;margin:12px 0 6px;}
  .grp-title.b1{color:var(--info);}
  .grp-title.f1{color:var(--muted);}
  .ci-row{background:var(--card);border:0.5px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:6px;}
  .ci-name{font-size:14px;}
  .ci-meta{font-size:12px;color:var(--hint);margin-top:2px;}
  .ci-meta .car{color:var(--info);}
  .days{display:flex;gap:6px;margin-top:8px;}
  .daybox{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
    font-size:13px;padding:9px 4px;border-radius:9px;border:0.5px solid var(--line2);
    background:var(--bg);cursor:pointer;user-select:none;min-height:42px;}
  .daybox.on{background:var(--info-bg);color:var(--info);border-color:var(--info-line);font-weight:600;}
  .daybox.empty{visibility:hidden;}
  .daybox input{width:17px;height:17px;margin:0;}
  .gift-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-top:8px;}
  @media(min-width:520px){.gift-grid{grid-template-columns:1fr 1fr;}}
  .gift-row{display:flex;align-items:center;gap:10px;background:var(--card);
    border:0.5px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;min-height:44px;}
  .gift-row input{width:18px;height:18px;margin:0;flex:0 0 auto;}
  .gift-row .note{color:var(--hint);font-size:12px;}
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
  @media(min-width:520px){.summary{grid-template-columns:repeat(4,1fr);}}
  .stat{background:var(--card);border:0.5px solid var(--line);border-radius:10px;padding:10px 12px;}
  .stat .l{font-size:12px;color:var(--muted);}
  .stat .v{font-size:22px;font-weight:600;margin-top:2px;}
  .theme{font-size:15px;font-weight:600;margin:10px 0;}
  .slot{border:0.5px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;background:var(--card);}
  .slot.inactive{background:var(--bg);opacity:.75;}
  .slot.done{border-color:var(--ok-line);}
  .slot .t{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .slot .ti{font-size:14px;margin-top:3px;}
  .slot .ti b{font-weight:600;}
  .iv{display:inline-block;margin-top:6px;background:var(--danger-bg);color:var(--danger);
    font-size:12px;padding:4px 10px;border-radius:8px;}
  .ctrls{display:flex;gap:8px;margin-top:10px;}
  .ctrls label{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:14px;padding:10px;border-radius:9px;border:0.5px solid var(--line2);
    background:var(--bg);cursor:pointer;user-select:none;min-height:44px;}
  .ctrls label.on{background:var(--info-bg);color:var(--info);border-color:var(--info-line);font-weight:600;}
  .ctrls input{width:18px;height:18px;margin:0;}
  .reset{font-size:12px;padding:7px 12px;border-radius:9px;border:0.5px solid var(--line2);

  .setup{background:var(--warn-bg);color:var(--warn);border-radius:12px;padding:16px;margin:12px 0;font-size:14px;line-height:1.6;}
  .setup code{background:#0002;padding:1px 5px;border-radius:4px;font-size:13px;}
</style>

let current="s1";
let local={};
let sb=null, connected=false;

function key(parts){return parts.join("|");}
function activeDays(p){return p.days?p.days:[0,1,2];}

function setSync(ok,txt){
  connected=ok;
  document.getElementById("dot").style.background=ok?"var(--ok)":"var(--hint)";
  document.getElementById("sync").textContent=txt||(ok?"團隊即時同步":"離線（本機）");
}

async function setVal(id,val){
  local[id]=val;
  if(sb&&connected){
    try{ await sb.from("bsh_state").upsert({id:id,value:val}); }
    catch(e){ saveLocal(); }
  }else{ saveLocal(); }
  render();
}
function getVal(id){return !!local[id];}
function saveLocal(){try{localStorage.setItem("bsh-local",JSON.stringify(local));}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem("bsh-local");if(r)local=JSON.parse(r);}catch(e){}}

async function initSupabase(){
  if(SUPABASE_URL.startsWith("貼上")||SUPABASE_KEY.startsWith("貼上")){
    document.getElementById("setupWarn").style.display="block";
    loadLocal(); setSync(false,"尚未設定（本機）"); render(); return;
  }
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const {data,error}=await sb.from("bsh_state").select("id,value");
    if(error)throw error;
    local={}; (data||[]).forEach(r=>local[r.id]=r.value);
    setSync(true);
    sb.channel("bsh").on("postgres_changes",
      {event:"*",schema:"public",table:"bsh_state"},
      payload=>{const r=payload.new;if(r&&r.id!==undefined){local[r.id]=r.value;render();}}
    ).subscribe();
    render();
  }catch(e){
    loadLocal(); setSync(false,"連線失敗（本機）"); render();
  }
}

function tabs(){
  const c=document.getElementById("tabs");c.innerHTML="";
  for(const sid in DATA){const b=document.createElement("button");
    b.textContent=DATA[sid].label;if(sid===current)b.className="active";
    b.onclick=()=>{current=sid;render();window.scrollTo(0,0);};c.appendChild(b);}
}

function ciRow(p,idx){
  const ad=activeDays(p);
  let boxes="";
  DAYS.forEach((d,di)=>{
    if(ad.includes(di)){
      const id=key(["ci",idx,di]);const on=getVal(id);
      boxes+=`<label class="daybox ${on?'on':''}"><input type="checkbox" data-id="${id}" ${on?'checked':''}>${d}</label>`;
    }else{boxes+=`<span class="daybox empty"></span>`;}
  });
  const meta=p.car?`<div class="ci-meta"><span class="car">🚗 ${p.car}</span></div>`:(p.note?`<div class="ci-meta">${p.note}</div>`:"");
  return `<div class="ci-row"><div class="ci-name">${p.name}</div>${meta}<div class="days">${boxes}</div></div>`;
}
function checkin(){
  const wrap=document.getElementById("checkin");
  let done=0,tot=0;
  CHECKIN.forEach((p,i)=>{activeDays(p).forEach(di=>{tot++;if(getVal(key(["ci",i,di])))done++;});});
  document.getElementById("ciCount").textContent=` ｜ ${done}/${tot} 報到`;
  let html=`<div class="grp-title f1">🚶 1樓接待</div>`;
  CHECKIN.forEach((p,i)=>{if(p.spot==="1樓")html+=ciRow(p,i);});
  html+=`<div class="grp-title b1">🚗 B1停車場接待（開車）</div>`;
  CHECKIN.forEach((p,i)=>{if(p.spot==="B1")html+=ciRow(p,i);});
  wrap.innerHTML=html;
  wrap.querySelectorAll("input").forEach(cb=>cb.onchange=()=>setVal(cb.dataset.id,cb.checked));
}
function gifts(){
  const wrap=document.getElementById("gifts");
  let done=0;GIFTS.forEach((g,i)=>{if(getVal(key(["gift",i])))done++;});
  document.getElementById("giftCount").textContent=` ｜ ${done}/${GIFTS.length} 已給（許德輝、陳守愚不備）`;
  wrap.innerHTML=GIFTS.map((g,i)=>{
    const id=key(["gift",i]);const on=getVal(id);
    return `<label class="gift-row"><input type="checkbox" data-id="${id}" ${on?'checked':''}><span>${g.name}${g.note?` <span class="note">${g.note}</span>`:""}</span></label>`;
  }).join("");
  wrap.querySelectorAll("input").forEach(cb=>cb.onchange=()=>setVal(cb.dataset.id,cb.checked));
}
function board(){

  document.getElementById("summary").innerHTML=`

    <div class="stat"><div class="l">已上台</div><div class="v">${up}/${stageRows}</div></div>
    <div class="stat"><div class="l">已下台</div><div class="v">${down}/${stageRows}</div></div>
    <div class="stat"><div class="l">受訪時段</div><div class="v">${iv}</div></div>`;
  const b=document.getElementById("board");
  let html=`<div class="theme">${s.theme}</div>`;
  s.rows.forEach((r,i)=>{
    const upId=key([current,i,"up"]),downId=key([current,i,"down"]);
    const upOn=getVal(upId),downOn=getVal(downId);
    let ctrls="";
    if(r.stage){
      ctrls=`<div class="ctrls">
        <label class="${upOn?'on':''}"><input type="checkbox" data-id="${upId}" ${upOn?'checked':''}>上台</label>
        <label class="${downOn?'on':''}"><input type="checkbox" data-id="${downId}" ${downOn?'checked':''}>下台</label></div>`;
    }
    const ivTag=r.interview?`<div class="iv">🎤 ${r.interview} · 2F講員休息室</div>`:"";
    const who=r.who?`<b>${r.who}</b>`:"—";
    html+=`<div class="slot ${r.stage?'':'inactive'} ${(r.stage&&downOn)?'done':''}">
      <div class="t">${r.t}</div>
      <div class="ti">${r.title}　${who}</div>${ivTag}${ctrls}</div>`;
  });
  b.innerHTML=html;
  b.querySelectorAll("input").forEach(cb=>cb.onchange=()=>setVal(cb.dataset.id,cb.checked));
}
function render(){tabs();checkin();gifts();board();}

document.getElementById("reset").onclick=async()=>{
  if(!confirm("確定要清除本場所有上台/下台勾選？"))return;
  const s=DATA[current];
  for(let i=0;i<s.rows.length;i++){
    if(s.rows[i].stage){await setVal(key([current,i,"up"]),false);await setVal(key([current,i,"down"]),false);}
  }
};
initSupabase();
</script>
